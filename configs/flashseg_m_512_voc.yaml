model_size: m
input_size: 512
num_classes: 21
backbone: shufflenetv2
neck: fpn
head: seg_head

epochs: 120
batch_size: 16
lr: 0.01
momentum: 0.9
weight_decay: 0.0005
warmup_epochs: 5
scheduler: cosine
amp: false

train_images: data/VOC2012/JPEGImages
train_masks: data/VOC2012/SegmentationClass
val_images: data/VOC2012/JPEGImages
val_masks: data/VOC2012/SegmentationClass

augment: true
num_workers: 4
pretrained: true
save_dir: workspace/flashseg_m_512_voc
device: cuda
